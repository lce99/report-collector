name: Daily Broker Report Digest

on:
  workflow_dispatch:
  schedule:
    # Cron runs in UTC. 00:00 UTC = 09:00 KST (collect), 06:30 UTC = 15:30 KST (update).
    - cron: "0 0 * * 1-5"
    - cron: "30 6 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-digest:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      TZ: Asia/Seoul
      REPORT_TIMEZONE: Asia/Seoul
      REPORT_PAGE_DEPTH: "4"
      MUST_READ_LIMIT: "12"
      ENABLE_DATE_FALLBACK: "true"
      MAX_DATE_FALLBACK_DAYS: "3"
      MARKET_DATA_ENABLED: ${{ vars.MARKET_DATA_ENABLED || 'true' }}
      MARKET_DATA_SOURCE: ${{ vars.MARKET_DATA_SOURCE || 'naver' }}
      MARKET_DATA_MAX_PAGES: ${{ vars.MARKET_DATA_MAX_PAGES || '8' }}
      MARKET_BENCHMARK: ${{ vars.MARKET_BENCHMARK || 'KOSPI' }}
      SUBJECT_TICKER_MAP: ${{ vars.SUBJECT_TICKER_MAP || '' }}
      PDF_TEXT_ENABLED: ${{ vars.PDF_TEXT_ENABLED || 'true' }}
      PDF_TEXT_PAGE_LIMIT: ${{ vars.PDF_TEXT_PAGE_LIMIT || '8' }}
      PDF_TEXT_CHAR_LIMIT: ${{ vars.PDF_TEXT_CHAR_LIMIT || '12000' }}
      PDF_TEXT_MIN_BODY_CHARS: ${{ vars.PDF_TEXT_MIN_BODY_CHARS || '500' }}
      OPENAI_SUMMARY_ENABLED: ${{ vars.OPENAI_SUMMARY_ENABLED || 'false' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini' }}
      OPENAI_SUMMARY_MAX_REPORTS: ${{ vars.OPENAI_SUMMARY_MAX_REPORTS || '8' }}
      OPENAI_SUMMARY_MIN_CHARS: ${{ vars.OPENAI_SUMMARY_MIN_CHARS || '180' }}
      OPENAI_SUMMARY_CHAR_LIMIT: ${{ vars.OPENAI_SUMMARY_CHAR_LIMIT || '6000' }}
      OPENAI_REASONING_EFFORT: ${{ vars.OPENAI_REASONING_EFFORT || '' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      BROKER_PRIORITY: 메리츠증권,삼성증권,신한투자증권,한국투자증권,키움증권,대신증권,하나증권,NH투자증권,KB증권,미래에셋증권,유안타증권
      PRIORITY_SUBJECTS: ${{ vars.PRIORITY_SUBJECTS }}
      PRIORITY_KEYWORDS: ${{ vars.PRIORITY_KEYWORDS }}
      PRIORITY_ONLY: ${{ vars.PRIORITY_ONLY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip -r requirements.txt

      - name: Run collector
        run: python run_daily.py

      - name: Commit updated archive and docs
        run: |
          if [ -n "$(git status --porcelain storage docs)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add storage docs
            git commit -m "chore: update daily broker digest"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload static dashboard
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
