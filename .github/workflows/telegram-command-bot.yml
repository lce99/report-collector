name: Telegram Command Bot

# Polls Telegram getUpdates and answers /today, /changes, /subject, /source,
# /watchlist from the published docs/data files.
#
# Run it manually from the Actions tab, or uncomment the schedule below to
# poll automatically. Note: a 10-minute weekday poll costs roughly 300+
# Actions minutes per month — keep an eye on your quota.
on:
  workflow_dispatch:
  # schedule:
  #   - cron: "*/10 0-9 * * 1-5"  # every 10 min, 09:00-18:59 KST weekdays

permissions:
  contents: write

concurrency:
  group: telegram-command-bot
  cancel-in-progress: false

jobs:
  respond:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip -r requirements.txt

      - name: Answer pending commands
        run: python scripts/telegram_command_bot.py --timeout 20

      - name: Persist update offset
        run: |
          if [ -n "$(git status --porcelain docs/data/telegram_command_state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/data/telegram_command_state.json
            git commit -m "chore: update telegram command bot offset"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
